services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: weatherapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: WeatherAPI.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=weatherapi;Username=postgres;Password=postgres
      - BaseUrl=http://localhost:8080
      - Cache__TtlMinutes=30
    depends_on:
      - db

volumes:
  postgres_data: